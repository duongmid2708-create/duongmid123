<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>duongmid123</title>
</head>

<body>
<h1>duongmid123 - AI Tool</h1>

<h2>1. Dịch AI</h2>
<textarea id="input" rows="4" cols="50"></textarea><br>
<button onclick="translate()">Dịch</button>

<h2>2. Sửa tiếng Nhật</h2>
<button onclick="fixJP()">Sửa câu</button>

<h2>Kết quả</h2>
<p id="output"></p>

<script>
const API_KEY = "AIzaSyD1Ni040sVrWExfE2_zPKIayGvgJTJr8wo";

async function callGemini(prompt) {
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }]
    })
  });
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || "Lỗi";
}

async function translate() {
  const text = document.getElementById("input").value;
  const result = await callGemini("Translate naturally: " + text);
  document.getElementById("output").innerText = result;
}

async function fixJP() {
  const text = document.getElementById("input").value;
  const result = await callGemini("Rewrite this Japanese sentence naturally and politely:\n" + text);
  document.getElementById("output").innerText = result;
}
</script>

</body>
</html>
