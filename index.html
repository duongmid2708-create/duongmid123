<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>duongmid123</title>
</head>
<body>
  <h1>duongmid123 - AI Tool</h1>

  <h2>1. Dịch AI (Gemini)</h2>
  <textarea id="input" rows="5" cols="50" placeholder="Nhập nội dung..."></textarea><br>
  <button onclick="translate()">Dịch</button>
  <p id="output"></p>

  <script>
    async function translate() {
      const text = document.getElementById("input").value;

      const response = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=AIzaSyD1Ni040sVrWExfE2_zPKIayGvgJTJr8wo", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          contents: [{
            parts: [{ text: "Translate this naturally into Vietnamese, Japanese, or English depending on context: " + text }]
          }]
        })
      });

      const data = await response.json();
      document.getElementById("output").innerText =
        data.candidates?.[0]?.content?.parts?.[0]?.text || "Lỗi";
    }
  </script>
</body>
</html>
